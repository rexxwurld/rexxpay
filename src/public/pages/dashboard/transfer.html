<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Send Money | RexxPay</title>

<link rel="stylesheet" href="../../assets/css/global.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body>

<div class="dashboard">

    <!-- SIDEBAR OVERLAY (mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">

        <div class="logo">
            <img src="../../assets/images/logo/logo.png" alt="RexxPay">
            <span>RexxPay</span>
        </div>

        <p class="sidebar-section-label">Main</p>

        <ul class="menu">
            <li class="active">
                <a href="dashboard.html">
                    <i class="bi bi-grid-fill"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li>
                <a href="wallet.html">
                    <i class="bi bi-wallet2"></i>
                    <span>Wallet</span>
                </a>
            </li>
            <li>
                <a href="transfer.html">
                    <i class="bi bi-send-fill"></i>
                    <span>Send Money</span>
                </a>
            </li>
            <li>
                <a href="transactions.html">
                    <i class="bi bi-clock-history"></i>
                    <span>Transactions</span>
                </a>
            </li>
        </ul>

        <p class="sidebar-section-label">Account</p>

        <ul class="menu">
            <li>
                <a href="beneficiaries.html">
                    <i class="bi bi-people-fill"></i>
                    <span>Beneficiaries</span>
                </a>
            </li>
            <li>
                <a href="kyc.html">
                    <i class="bi bi-shield-check"></i>
                    <span>KYC</span>
                    <span class="menu-badge">!</span>
                </a>
            </li>
            <li>
                <a href="notifications.html">
                    <i class="bi bi-bell-fill"></i>
                    <span>Notifications</span>
                    <span class="menu-badge">3</span>
                </a>
            </li>
            <li>
                <a href="settings.html">
                    <i class="bi bi-gear-fill"></i>
                    <span>Settings</span>
                </a>
            </li>
        </ul>

        <div class="sidebar-footer">
            <button id="logoutBtn" class="logout-btn">
                <i class="bi bi-box-arrow-left"></i>
                <span>Logout</span>
            </button>
        </div>

    </aside>

    <!-- MAIN CONTENT -->
    <main class="main">

        <!-- TOPBAR -->
        <header class="topbar">
            <div class="topbar-left">
                <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle menu">
                    <i class="bi bi-list"></i>
                </button>
                <div>
                    <p class="topbar-greeting" id="greeting">Good morning</p>
                    <h2 id="username">User</h2>
                </div>
            </div>

            <div class="topbar-right">
                <button class="topbar-icon-btn" title="Notifications">
                    <i class="bi bi-bell"></i>
                    <span class="notif-dot"></span>
                </button>
                <div class="user-box">
                    <div class="avatar" id="userAvatar">U</div>
                    <span class="user-name" id="userEmail">user@rexxpay.com</span>
                </div>
            </div>
        </header>




















<!-- TRANSFER FORM -->
<section class="transfer-card">

<form id="transferForm">

<div class="input-group">
<label>Recipient Account Number</label>
<input type="text" id="accountNumber" placeholder="Enter account number" required>
</div>

<div class="input-group">
<label>Bank</label>
<input type="text" id="bank" placeholder="Bank name" required>
</div>

<div class="input-group">
<label>Amount (₦)</label>
<input type="number" id="amount" placeholder="Enter amount" required>
</div>

<div class="input-group">
<label>Description (Optional)</label>
<input type="text" id="description" placeholder="Payment note">
</div>
<div id="transferMsg" style="display:none; padding:12px; border-radius:8px; margin-bottom:12px; font-size:14px;"></div>


<button type="submit" class="btn-primary auth-btn">
Send Money
</button>

</form>

</section>

</main>

</div>
<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/auth.js"></script>
<script src="../../assets/js/transfer.js"></script>
<script>
    // Sidebar toggle
    const sidebarToggle = document.getElementById('sidebarToggle');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');

    sidebarToggle?.addEventListener('click', () => {
        sidebar.classList.toggle('open');
        overlay.classList.toggle('show');
    });
    overlay?.addEventListener('click', () => {
        sidebar.classList.remove('open');
        overlay.classList.remove('show');
    }); 
    
    
</script>
</body>

</html>
