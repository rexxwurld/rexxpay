<!-- pages/auth/reset-password.html -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reset Password | RexxPay</title>

<link rel="stylesheet" href="../../assets/css/global.css">
<link rel="stylesheet" href="../../assets/css/auth.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body>

<section class="auth-page">

<div class="auth-container">

<div class="auth-left">

<a href="../../index.html" class="logo">

<img src="../../assets/images/logo/logo.png" alt="RexxPay">

</a>

<h1>Reset Password</h1>

<p>

Create a new secure password for your RexxPay account.

</p>

<img src="../../assets/images/banners/reset-password.png" alt="Reset Password">

</div>

<div class="auth-right">

<form id="resetPasswordForm">

<h2>New Password</h2>

<p>Enter your new password below.</p>

<div class="input-group">

<label>New Password</label>

<div class="password-box">

<input
type="password"
id="newPassword"
placeholder="Enter new password"
required>

<button type="button" class="toggle-password">

<i class="bi bi-eye"></i>

</button>

</div>

</div>

<div class="input-group">

<label>Confirm Password</label>

<input
type="password"
id="confirmPassword"
placeholder="Confirm password"
required>

</div>

<button type="submit" class="btn-primary auth-btn">

Reset Password

</button>

<p class="auth-link">

Back to

<a href="login.html">Login</a>

</p>

</form>

</div>

</div>

</section>
<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/auth.js"></script>

</body>

</html>
