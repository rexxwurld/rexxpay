<!-- pages/auth/login.html -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | RexxPay</title>

<link rel="stylesheet" href="../../assets/css/global.css">
<link rel="stylesheet" href="../../assets/css/auth.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body>

<section class="auth-page">

<div class="auth-container">

<div class="auth-left">

<a href="../../index.html" class="logo">

<img src="../../assets/images/logo/logo.png" alt="RexxPay">

</a>

<h1>

Welcome Back

</h1>

<p>

Login to access your wallet, transfer money, manage beneficiaries and view your transaction history.

</p>

<img src="../../assets/images/banners/login.png" alt="Login">

</div>

<div class="auth-right">

<form id="loginForm">

<h2>Sign In</h2>

<p>

Enter your account details below.

</p>

<div class="input-group">

<label>Email Address</label>

<input
type="email"
id="email"
placeholder="Enter your email"
required>

</div>

<div class="input-group">

<label>Password</label>

<div class="password-box">

<input
type="password"
id="password"
placeholder="Enter password"
required>

<button
type="button"
class="toggle-password">

<i class="bi bi-eye"></i>

</button>

</div>

</div>

<div class="remember">

<label>

<input type="checkbox">

Remember Me

</label>

<a href="forgot-password.html">

Forgot Password?

</a>

</div>

<button
type="submit"
class="btn-primary auth-btn">

Login

</button>

<div class="divider">

<span>OR</span>

</div>

<button
type="button"
class="google-btn">

<i class="bi bi-google"></i>

Continue with Google

</button>

<p class="auth-link">

Don't have an account?

<a href="register.html">

Create One

</a>

</p>

</form>

</div>

</div>

</section>
<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/auth.js"></script>

</body>

</html>
