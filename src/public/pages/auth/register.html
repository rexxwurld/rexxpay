<!-- pages/auth/register.html -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account | RexxPay</title>

<link rel="stylesheet" href="../../assets/css/global.css">
<link rel="stylesheet" href="../../assets/css/auth.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body>

<section class="auth-page">

<div class="auth-container">

<div class="auth-left">

<a href="../../index.html" class="logo">

<img src="../../assets/images/logo/logo.png" alt="RexxPay">

</a>

<h1>Create Your Account</h1>

<p>

Open your free RexxPay account in minutes and enjoy secure transfers, digital wallets, bill payments and more.

</p>

<img src="../../assets/images/banners/register.png" alt="Register">

</div>

<div class="auth-right">

<form id="registerForm">

<h2>Sign Up</h2>

<p>Fill in your details below.</p>

<div class="input-group">

<label>Full Name</label>

<input
type="text"
id="fullname"
placeholder="John Doe"
required>

</div>

<div class="input-group">

<label>Email Address</label>

<input
type="email"
id="email"
placeholder="example@email.com"
required>

</div>

<div class="input-group">

<label>Phone Number</label>

<input
type="tel"
id="phone"
placeholder="+234xxxxxxxxxx"
required>

</div>

<div class="input-group">

<label>Password</label>

<div class="password-box">

<input
type="password"
id="password"
placeholder="Create Password"
required>

<button
type="button"
class="toggle-password">

<i class="bi bi-eye"></i>

</button>

</div>

</div>

<div class="input-group">

<label>Confirm Password</label>

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password"
required>

</div>

<div class="remember">

<label>

<input type="checkbox" required>

I agree to the Terms & Privacy Policy

</label>

</div>

<button
type="submit"
class="btn-primary auth-btn">

Create Account

</button>

<div class="divider">

<span>OR</span>

</div>

<button
type="button"
class="google-btn">

<i class="bi bi-google"></i>

Continue with Google

</button>

<p class="auth-link">

Already have an account?

<a href="login.html">

Login

</a>

</p>

</form>

</div>

</div>

</section>
<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/auth.js"></script>

</body>

</html>
