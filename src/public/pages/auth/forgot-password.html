<!-- pages/auth/forgot-password.html -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password | RexxPay</title>

<link rel="stylesheet" href="../../assets/css/global.css">
<link rel="stylesheet" href="../../assets/css/auth.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body>

<section class="auth-page">

<div class="auth-container">

<div class="auth-left">

<a href="../../index.html" class="logo">

<img src="../../assets/images/logo/logo.png" alt="RexxPay">

</a>

<h1>Forgot Password?</h1>

<p>

Enter your registered email address and we'll send you a One-Time Password (OTP) to reset your password.

</p>

<img src="../../assets/images/banners/forgot-password.png" alt="Forgot Password">

</div>

<div class="auth-right">

<form id="forgotPasswordForm">

<h2>Reset Password</h2>

<p>

Enter your email below.

</p>

<div class="input-group">

<label>Email Address</label>

<input
type="email"
id="email"
placeholder="Enter your email"
required>

</div>

<button
type="submit"
class="btn-primary auth-btn">

Send OTP

</button>

<p class="auth-link">

Remember your password?

<a href="login.html">

Login

</a>

</p>

</form>

</div>

</div>

</section>
<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/auth.js"></script>

</body>

</html>
