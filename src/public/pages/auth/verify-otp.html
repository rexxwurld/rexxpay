<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verify OTP | RexxPay</title>

<link rel="stylesheet" href="../../assets/css/global.css">
<link rel="stylesheet" href="../../assets/css/auth.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body>

<section class="auth-page">

<div class="auth-container">

<div class="auth-left">

<a href="../../index.html" class="logo">

<img src="../../assets/images/logo/logo.png" alt="RexxPay">

</a>

<h1>Verify OTP</h1>

<p>

Enter the 6-digit code sent to your email or phone number to continue.

</p>

<img src="../../assets/images/banners/otp.png" alt="OTP Verification">

</div>

<div class="auth-right">

<form id="otpForm">

<h2>OTP Verification</h2>

<p>Check your inbox or SMS for the code.</p>

<div class="input-group">

<label>Enter OTP</label>

<input
type="text"
id="otp"
placeholder="123456"
maxlength="6"
required>

</div>

<button type="submit" class="btn-primary auth-btn">

Verify OTP

</button>

<p class="auth-link">

Didn't receive code?

<a href="#" id="resendOtp">

Resend OTP

</a>

</p>

</form>

</div>

</div>

</section>
<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/auth.js"></script>

</body>

</html>
